# observability/promtail/promtail-config.yaml
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: dockerlogs
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            attrs: attrs
      - labels:
          stream: stream
      - regex:
          expression: '^.*"(?P<level>INFO|WARN|ERROR|DEBUG|CRITICAL).*$'
      - labels:
          level: level

  - job_name: cdss-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: cdss
          __path__: /app/logs/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3})\s+(?P<level>[A-Z]+)\s+(?P<module>[a-zA-Z_]+)\s+(?P<message>.*)$'
      - labels:
          level: level
          module: module