# config/api_config.yaml
# API Configuration

host: "0.0.0.0"
port: 8000
debug: false
reload: false

cors:
  origins: ["*"]
  credentials: true
  methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  headers: ["*"]

rate_limiting:
  limit: 100
  period: "minute"
  burst: 150
  excluded_paths:
    - "/health"
    - "/metrics"
    - "/"
    - "/docs"
    - "/redoc"

security:
  jwt_secret: "${JWT_SECRET_KEY}"
  algorithm: "HS256"
  access_token_expiry: 3600
  refresh_token_expiry: 604800

timeouts:
  read_timeout: 30
  write_timeout: 30
  connect_timeout: 10
  max_request_size: 10485760

headers:
  server_header: false
  date_header: false
  cors_enabled: true