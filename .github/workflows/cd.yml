# .github/workflows/cd.yml
name: Continuous Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ============================================================================
  # 🚀 Deploy to Production
  # ============================================================================
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      
    - name: Set up Kubeconfig
      uses: azure/setup-kubectl@v3
      with:
        kubeconfig: ${{ secrets.KUBECONFIG }}
        
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/cdss-api cdss-api=${{ secrets.DOCKERHUB_USERNAME }}/cdss-api:${{ github.ref_name }} -n cdss
        kubectl rollout status deployment/cdss-api -n cdss --timeout=5m
        
    - name: Verify deployment
      run: |
        kubectl run -i --tty --rm health-check \
          --image=curlimages/curl:latest \
          --restart=Never \
          -- curl -s -f http://cdss-api-service:8000/health -n cdss
          
    - name: Send deployment notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_COLOR: good
        SLACK_TITLE: '🚀 CDSS Deployment Successful'
        SLACK_MESSAGE: |
          Version: ${{ github.ref_name }}
          Environment: Production
          SHA: ${{ github.sha }}