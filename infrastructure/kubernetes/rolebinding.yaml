---
# ============================================================================
# 🔗 RoleBinding - API Service (Main Binding)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-api-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: backend
  annotations:
    description: "Binds cdss-role to API and Worker service accounts"
    rbac.authorization.kubernetes.io/autoupdate: "true"
subjects:
- kind: ServiceAccount
  name: cdss-api-sa
  namespace: cdss
- kind: ServiceAccount
  name: cdss-worker-sa
  namespace: cdss
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 ClusterRoleBinding - API Service (Cluster-wide)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cdss-api-clusterrolebinding
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: backend
  annotations:
    description: "Binds clusterrole to API service account for cluster-wide permissions"
subjects:
- kind: ServiceAccount
  name: cdss-api-sa
  namespace: cdss
roleRef:
  kind: ClusterRole
  name: cdss-api-clusterrole
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - CronJob Service
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-cronjob-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: backend
subjects:
- kind: ServiceAccount
  name: cdss-cronjob-sa
  namespace: cdss
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - Canary Service
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-canary-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: backend
subjects:
- kind: ServiceAccount
  name: cdss-canary-sa
  namespace: cdss
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - Monitoring (Prometheus)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-monitoring-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: monitoring
  annotations:
    description: "Binds monitoring role to Prometheus service account"
subjects:
- kind: ServiceAccount
  name: prometheus-k8s
  namespace: monitoring
- kind: ServiceAccount
  name: prometheus-operator
  namespace: monitoring
- kind: ServiceAccount
  name: grafana
  namespace: monitoring
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - GitOps (ArgoCD / Flux)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-gitops-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: gitops
subjects:
- kind: ServiceAccount
  name: argocd-manager
  namespace: argocd
- kind: ServiceAccount
  name: flux-system
  namespace: flux-system
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - CI/CD (GitLab/GitHub Actions)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-cicd-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: cicd
subjects:
- kind: ServiceAccount
  name: gitlab-runner
  namespace: gitlab
- kind: ServiceAccount
  name: github-actions
  namespace: github
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔗 RoleBinding - Auditors (Read-Only Access)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-auditor-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: security
subjects:
- kind: User
  name: auditor@healthcare.com
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: security-team
  apiGroup: rbac.authorization.k8s.io
- kind: ServiceAccount
  name: audit-logger
  namespace: security
roleRef:
  kind: Role
  name: cdss-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# 🔑 Pod Security Policy (Production Hardening)
# ============================================================================
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: cdss-psp
  namespace: cdss
  labels:
    app: cdss
    component: security
    environment: production
    tier: security
  annotations:
    description: "Pod Security Policy for CDSS workloads"
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: 'runtime/default'
    seccomp.security.alpha.kubernetes.io/defaultProfileName: 'runtime/default'
spec:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  requiredDropCapabilities:
  - ALL
  volumes:
  - 'configMap'
  - 'emptyDir'
  - 'persistentVolumeClaim'
  - 'secret'
  - 'projected'
  - 'downwardAPI'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
    ranges:
    - min: 1000
      max: 9999
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'MustRunAs'
    ranges:
    - min: 1000
      max: 9999
  supplementalGroups:
    rule: 'MustRunAs'
    ranges:
    - min: 1000
      max: 9999

---
# ============================================================================
# 🔗 PodSecurityPolicy Binding
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cdss-psp-role
  labels:
    app: cdss
    component: security
    environment: production
rules:
- apiGroups: ['policy']
  resources: ['podsecuritypolicies']
  verbs: ['use']
  resourceNames: ['cdss-psp']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-psp-binding
  namespace: cdss
  labels:
    app: cdss
    component: security
    environment: production
subjects:
- kind: ServiceAccount
  name: cdss-api-sa
  namespace: cdss
- kind: ServiceAccount
  name: cdss-worker-sa
  namespace: cdss
- kind: ServiceAccount
  name: cdss-cronjob-sa
  namespace: cdss
roleRef:
  kind: ClusterRole
  name: cdss-psp-role
  apiGroup: rbac.authorization.k8s.io