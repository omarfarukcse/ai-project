# infrastructure/kubernetes/rolebinding.yaml
# Complete RBAC Configuration for CDSS Healthcare

---
# ============================================================================
# 👤 Service Account - API Service
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-api-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
    tier: backend
  annotations:
    description: "Service Account for CDSS API - Production"
    kubernetes.io/enforce-mountable-secrets: "true"

---
# ============================================================================
# 👤 Service Account - Worker Service
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-worker-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
    tier: backend
  annotations:
    description: "Service Account for CDSS Celery Workers"

---
# ============================================================================
# 👤 Service Account - CronJob Service
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-cronjob-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
    tier: backend
  annotations:
    description: "Service Account for CDSS Scheduled Jobs"

---
# ============================================================================
# 👤 Service Account - Canary Deployment
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-canary-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
    tier: backend
  annotations:
    description: "Service Account for CDSS Canary Deployments"

---
# ============================================================================
# 🔑 ClusterRole - CDSS API (Cluster-wide permissions)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cdss-api-clusterrole
  labels:
    app: cdss
    component: rbac
    environment: production
  annotations:
    description: "Cluster-wide permissions for CDSS API"
    rbac.authorization.kubernetes.io/autoupdate: "true"
rules:
# Core API Resources - Read Only (cluster-wide)
- apiGroups: [""]
  resources:
  - "nodes"
  - "nodes/metrics"
  - "nodes/stats"
  - "persistentvolumes"
  - "storageclasses"
  verbs:
  - "get"
  - "list"
  - "watch"

# Pod Security Policies (if enabled)
- apiGroups: ["policy"]
  resources:
  - "podsecuritypolicies"
  verbs:
  - "use"

# Custom Resource Definitions - Read Only
- apiGroups: ["apiextensions.k8s.io"]
  resources:
  - "customresourcedefinitions"
  verbs:
  - "get"
  - "list"
  - "watch"

---
# ============================================================================
# 🔑 Role - CDSS Namespace (Namespace-specific permissions)
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdss-role
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
    tier: backend
  annotations:
    description: "Full namespace permissions for CDSS services"
rules:
# ============================================================================
# 📦 Core API Resources
# ============================================================================
# Pods - Full Access
- apiGroups: [""]
  resources:
  - "pods"
  - "pods/log"
  - "pods/status"
  - "pods/exec"
  - "pods/attach"
  - "pods/portforward"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# Services - Full Access
- apiGroups: [""]
  resources:
  - "services"
  - "services/status"
  - "endpoints"
  - "endpoints/status"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# ConfigMaps & Secrets - Full Access
- apiGroups: [""]
  resources:
  - "configmaps"
  - "secrets"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# PersistentVolumeClaims - Full Access
- apiGroups: [""]
  resources:
  - "persistentvolumeclaims"
  - "persistentvolumeclaims/status"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# Events - Full Access
- apiGroups: [""]
  resources:
  - "events"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# Namespaces - Read Only
- apiGroups: [""]
  resources:
  - "namespaces"
  - "namespaces/status"
  - "namespaces/finalize"
  verbs:
  - "get"
  - "list"
  - "watch"

# ResourceQuotas & LimitRanges - Full Access
- apiGroups: [""]
  resources:
  - "resourcequotas"
  - "resourcequotas/status"
  - "limitranges"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# ServiceAccounts - Full Access
- apiGroups: [""]
  resources:
  - "serviceaccounts"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# ============================================================================
# 📱 Apps Resources
# ============================================================================
# Deployments - Full Access
- apiGroups: ["apps"]
  resources:
  - "deployments"
  - "deployments/status"
  - "deployments/scale"
  - "deployments/finalizers"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# StatefulSets - Full Access
- apiGroups: ["apps"]
  resources:
  - "statefulsets"
  - "statefulsets/status"
  - "statefulsets/scale"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# DaemonSets - Full Access
- apiGroups: ["apps"]
  resources:
  - "daemonsets"
  - "daemonsets/status"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# ReplicaSets - Full Access
- apiGroups: ["apps"]
  resources:
  - "replicasets"
  - "replicasets/status"
  - "replicasets/scale"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# ============================================================================
# 📊 Autoscaling Resources
# ============================================================================
# HorizontalPodAutoscalers - Full Access
- apiGroups: ["autoscaling"]
  resources:
  - "horizontalpodautoscalers"
  - "horizontalpodautoscalers/status"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"

# VerticalPodAutoscalers - Full Access
- apiGroups: ["autoscaling.k8s.io"]
  resources:
  - "verticalpodautoscalers"
  - "verticalpodautoscalers/status"
