# infrastructure/kubernetes/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdss-api
  namespace: cdss
  labels:
    app: cdss
    component: api
    version: v3.0.0
    environment: production
    tier: backend
    team: ml-platform
  annotations:
    description: "CDSS API Server - Production"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
    reloader.stakater.com/auto: "true"  # Auto-restart on config change
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cdss
      component: api
  template:
    metadata:
      labels:
        app: cdss
        component: api
        version: v3.0.0
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        checksum/config: "{{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}"
        checksum/secret: "{{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}"
    spec:
      serviceAccountName: cdss-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: cdss-healthcare-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # From ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: LOG_LEVEL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: REDIS_HOST
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: DB_HOST
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: MLFLOW_TRACKING_URI
        # From Secrets
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: cdss-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cdss-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cdss-secrets
              key: JWT_SECRET_KEY
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cdss-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 30
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: features
          mountPath: /app/data/feature_store
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: cdss-models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: cdss-data-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: cdss-logs-pvc
      - name: features
        persistentVolumeClaim:
          claimName: cdss-features-pvc
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
          medium: Memory
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-type: application
      tolerations:
      - key: "node-role.kubernetes.io/worker"
        operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cdss
              topologyKey: kubernetes.io/hostname
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - redis
              topologyKey: topology.kubernetes.io/zone
      imagePullSecrets:
      - name: regcred
      priorityClassName: production-critical
      dnsPolicy: ClusterFirst
      restartPolicy: Always