# infrastructure/kubernetes/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdss-api
  namespace: healthcare
  labels:
    app: cdss-api
    version: v3.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cdss-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cdss-api
        version: v3.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: cdss-api
        image: cdss-healthcare:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: environment
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: log_level
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: redis_host
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: cdss-config
              key: mlflow_tracking_uri
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
        - name: data-storage
          mountPath: /app/data
        - name: logs-storage
          mountPath: /app/logs
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: cdss-models-pvc
      - name: data-storage
        persistentVolumeClaim:
          claimName: cdss-data-pvc
      - name: logs-storage
        persistentVolumeClaim:
          claimName: cdss-logs-pvc
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
      - name: docker-registry-secret
---
# infrastructure/kubernetes/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: cdss-api-service
  namespace: healthcare
  labels:
    app: cdss-api
spec:
  selector:
    app: cdss-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
---
# infrastructure/kubernetes/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdss-api-hpa
  namespace: healthcare
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdss-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: requests_per_second
      target:
        type: AverageValue
        averageValue: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
# infrastructure/kubernetes/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cdss-ingress
  namespace: healthcare
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.cdss-healthcare.com
    - dashboard.cdss-healthcare.com
    secretName: cdss-tls-secret
  rules:
  - host: api.cdss-healthcare.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cdss-api-service
            port:
              number: 80
  - host: dashboard.cdss-healthcare.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cdss-dashboard-service
            port:
              number: 8501
---
# infrastructure/kubernetes/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdss-config
  namespace: healthcare
data:
  environment: "production"
  log_level: "INFO"
  redis_host: "redis-service.redis.svc.cluster.local"
  mlflow_tracking_uri: "http://mlflow-service.mlflow.svc.cluster.local:5000"
  model_version: "latest"
  cache_ttl: "3600"
  rate_limit: "100"
  rate_limit_period: "minute"