# infrastructure/kubernetes/kustomization.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cdss-prod
  namespace: cdss
spec:
  interval: 5m
  path: ./infrastructure/kubernetes/overlays/production
  prune: true
  validation: client
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: cdss-api
    namespace: cdss
  - apiVersion: apps/v1
    kind: StatefulSet
    name: redis
    namespace: cdss
  - apiVersion: apps/v1
    kind: StatefulSet
    name: postgres
    namespace: cdss
  patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cdss-api
      spec:
        replicas: 5
  sourceRef:
    kind: GitRepository
    name: cdss
    namespace: flux-system
