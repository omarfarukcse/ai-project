# infrastructure/kubernetes/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdss-api-hpa
  namespace: cdss
  labels:
    app: cdss
    component: api
    environment: production
  annotations:
    description: "CDSS API Auto-scaling - Production"
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdss-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Custom metric: Requests per second
  - type: Pods
    pods:
      metric:
        name: requests_per_second
        selector:
          matchLabels:
            app: cdss
      target:
        type: AverageValue
        averageValue: "50"
  # Custom metric: Queue length
  - type: Pods
    pods:
      metric:
        name: celery_queue_length
        selector:
          matchLabels:
            app: cdss
            component: worker
      target:
        type: AverageValue
        averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
---
# Vertical Pod Autoscaler (optional)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cdss-api-vpa
  namespace: cdss
  labels:
    app: cdss
    component: api
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdss-api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: api
      minAllowed:
        cpu: "250m"
        memory: "512Mi"
      maxAllowed:
        cpu: "4"
        memory: "8Gi"
      controlledResources: ["cpu", "memory"]