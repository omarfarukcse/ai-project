# infrastructure/kubernetes/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-api-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdss-cronjob-sa
  namespace: cdss
  labels:
    app: cdss
    component: serviceaccount
    environment: production
---
# infrastructure/kubernetes/role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdss-api-role
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["monitoring.coreos.com"]
  resources: ["servicemonitors"]
  verbs: ["get", "create", "update"]
---
# infrastructure/kubernetes/rolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdss-api-rolebinding
  namespace: cdss
  labels:
    app: cdss
    component: rbac
    environment: production
subjects:
- kind: ServiceAccount
  name: cdss-api-sa
  namespace: cdss
roleRef:
  kind: Role
  name: cdss-api-role
  apiGroup: rbac.authorization.k8s.io