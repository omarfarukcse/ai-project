# infrastructure/kubernetes/secrets.yaml
# ⚠️ WARNING: This is for reference only. 
# In production, use:
# 1. AWS Secrets Manager
# 2. Google Secret Manager
# 3. Azure Key Vault
# 4. HashiCorp Vault
# 5. Sealed Secrets (for Git)

apiVersion: v1
kind: Secret
metadata:
  name: cdss-secrets
  namespace: cdss
  labels:
    app: cdss
    component: api
    environment: production
type: Opaque
stringData:
  # Database Credentials
  DB_USERNAME: "cdss_prod_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Configuration
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  JWT_ALGORITHM: "HS256"
  
  # Encryption Keys
  ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION"
  FEATURE_ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # API Keys
  API_KEY_HASH: "CHANGE_ME_IN_PRODUCTION"
  
  # MLflow Password
  MLFLOW_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Monitoring
  PROMETHEUS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  GRAFANA_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Slack Webhook (for alerts)
  SLACK_WEBHOOK_URL: "CHANGE_ME_IN_PRODUCTION"
  
  # PagerDuty
  PAGERDUTY_SERVICE_KEY: "CHANGE_ME_IN_PRODUCTION"
  PAGERDUTY_ROUTING_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # AWS Credentials (if using S3)
  AWS_ACCESS_KEY_ID: "CHANGE_ME_IN_PRODUCTION"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION"
  AWS_REGION: "us-east-1"
  S3_BUCKET: "cdss-models-prod"
---
# Use Sealed Secrets for GitOps
# https://github.com/bitnami-labs/sealed-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cdss-sealed-secrets
  namespace: cdss
spec:
  encryptedData:
    DB_PASSWORD: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...